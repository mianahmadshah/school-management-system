<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Complete - EduCore SMS</title>
    <!-- Google Fonts (Inter) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root {
            --color-primary: #315EFB;
            --color-primary-hover: #264BD9;
            --color-background: #F6F8FB;
            --color-surface: #FFFFFF;
            --color-text-primary: #111827;
            --color-text-secondary: #4B5563;
            --color-border: #E5E7EB;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--color-background);
            min-height: 100vh;
        }
        .login-card {
            border: 1px solid var(--color-border);
            border-radius: 20px;
            box-shadow: 0 12px 32px rgba(17, 24, 39, 0.08), 0 4px 12px rgba(17, 24, 39, 0.04);
            background-color: var(--color-surface);
        }
        .brand-icon {
            width: 56px;
            height: 56px;
            background-color: #F0FDF4;
            color: #16A34A;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.75rem;
            margin: 0 auto 20px;
            box-shadow: 0 4px 12px rgba(22, 163, 74, 0.15);
        }
        .btn-primary {
            background: linear-gradient(135deg, #315EFB 0%, #6D7CFB 100%);
            border: none;
            box-shadow: 0 2px 4px rgba(49, 94, 251, 0.2);
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #315EFB 0%, #818CF8 100%);
            box-shadow: 0 4px 12px rgba(49, 94, 251, 0.35);
            transform: translateY(-1px);
        }
    </style>
</head>
<body class="d-flex align-items-center py-5">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-5 col-xl-4">
                
                <div class="card login-card p-4 p-md-5 text-center">
                    
                    <div class="brand-icon">
                        <i class="bi bi-check-circle-fill"></i>
                    </div>
                    
                    <h3 class="fw-bold text-dark mb-3">Password Reset</h3>
                    
                    <p class="text-secondary text-sm mb-4">
                        Your password has been successfully set. You may now sign in with your new password.
                    </p>
                    
                    <a href="{% url 'login' %}" class="btn btn-primary w-100 py-2.5 fw-semibold rounded-3 shadow-sm">
                        Sign In
                    </a>

                </div>

            </div>
        </div>
    </div>

</body>
</html>
